<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PIXEL SMASH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --green: #39ff6a;
    --red: #ff3939;
    --yellow: #ffe939;
    --cyan: #39eeff;
    --purple: #b439ff;
    --white: #e8e8ff;
    --dim: #4a4a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    background: var(--bg);
    font-family: 'Press Start 2P', monospace;
    color: var(--white);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT flicker */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 99;
  }

  #app {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 12px;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    padding: 18px 0 8px;
    text-align: center;
    position: relative;
  }
  .logo {
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--green);
    text-shadow: 0 0 8px var(--green), 0 0 20px rgba(57,255,106,0.4);
    animation: flicker 4s infinite;
  }
  .tagline {
    font-size: 6px;
    color: var(--dim);
    margin-top: 6px;
    letter-spacing: 2px;
  }

  @keyframes flicker {
    0%,96%,100% { opacity: 1; }
    97% { opacity: 0.6; }
    98% { opacity: 1; }
    99% { opacity: 0.4; }
  }

  /* ── SCORE BAR ── */
  .score-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    margin: 6px 0;
    background: var(--panel);
    border: 2px solid var(--border);
    image-rendering: pixelated;
    position: relative;
  }
  .score-bar::before, .score-bar::after {
    content: '▪';
    color: var(--dim);
    font-size: 8px;
    position: absolute;
    top: 50%; transform: translateY(-50%);
  }
  .score-bar::before { left: 4px; }
  .score-bar::after { right: 4px; }

  .score-block { text-align: center; }
  .score-label { font-size: 6px; color: var(--dim); margin-bottom: 4px; }
  .score-val { font-size: 13px; }
  .score-val.green { color: var(--green); text-shadow: 0 0 6px var(--green); }
  .score-val.yellow { color: var(--yellow); text-shadow: 0 0 6px var(--yellow); }
  .score-val.cyan { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }

  /* ── LIVES ── */
  .lives {
    display: flex; gap: 6px; align-items: center;
  }
  .heart {
    font-size: 14px;
    transition: filter 0.2s;
  }
  .heart.dead { filter: grayscale(1) brightness(0.3); }

  /* ── COMBO METER ── */
  .combo-bar-wrap {
    width: 100%;
    padding: 0 2px;
    margin-bottom: 6px;
  }
  .combo-label {
    font-size: 6px;
    color: var(--dim);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  .combo-track {
    height: 8px;
    background: var(--panel);
    border: 2px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .combo-fill {
    height: 100%;
    background: var(--purple);
    box-shadow: 0 0 8px var(--purple);
    transition: width 0.15s, background 0.2s;
    width: 0%;
  }

  /* ── GAME ARENA ── */
  #arena {
    width: 100%;
    flex: 1;
    position: relative;
    background: var(--panel);
    border: 3px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    min-height: 340px;
    max-height: 460px;
  }

  /* pixel grid bg */
  #arena::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 24px 24px;
    opacity: 0.3;
  }

  /* ── TARGETS ── */
  .target {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    cursor: pointer;
    transition: transform 0.08s;
    user-select: none;
    -webkit-user-select: none;
    animation: popIn 0.12s ease-out forwards;
  }
  .target-inner {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .target-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 3px solid currentColor;
    opacity: 0.5;
    animation: borderPulse 0.6s infinite alternate;
  }

  @keyframes popIn {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);  opacity: 1; }
  }
  @keyframes borderPulse {
    from { opacity: 0.2; }
    to   { opacity: 0.7; }
  }

  .target.good { color: var(--green); }
  .target.bad  { color: var(--red);   }
  .target.bonus{ color: var(--yellow);}

  /* ── BURST PARTICLES ── */
  .burst {
    position: absolute;
    pointer-events: none;
    font-size: 10px;
    animation: burstOut 0.5s ease-out forwards;
    z-index: 20;
  }
  @keyframes burstOut {
    from { transform: translate(0,0) scale(1); opacity: 1; }
    to   { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* ── MISS FLASH ── */
  .miss-flash {
    position: absolute;
    inset: 0;
    background: rgba(255,57,57,0.18);
    pointer-events: none;
    z-index: 15;
    animation: flashOut 0.3s forwards;
  }
  @keyframes flashOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* ── FLOATING SCORE TEXT ── */
  .float-text {
    position: absolute;
    pointer-events: none;
    font-size: 9px;
    z-index: 25;
    animation: floatUp 0.8s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to   { transform: translateY(-48px); opacity: 0; }
  }

  /* ── TIMER BAR ── */
  .timer-wrap {
    width: 100%;
    margin: 8px 0 6px;
  }
  .timer-track {
    height: 10px;
    background: var(--panel);
    border: 2px solid var(--border);
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    transition: width 0.1s linear, background 0.3s;
    width: 100%;
  }
  .timer-fill.warn { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .timer-fill.danger { background: var(--red); box-shadow: 0 0 8px var(--red); }

  /* ── SCREENS ── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: rgba(10,10,15,0.92);
    z-index: 50;
    padding: 24px;
    text-align: center;
  }
  .screen.hidden { display: none; }

  .screen-title {
    font-size: 18px;
    color: var(--green);
    text-shadow: 0 0 10px var(--green);
    animation: flicker 3s infinite;
    line-height: 1.6;
  }
  .screen-sub {
    font-size: 7px;
    color: var(--dim);
    line-height: 2;
    max-width: 260px;
  }

  .pixel-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 14px 24px;
    border: 3px solid var(--green);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    letter-spacing: 2px;
    text-shadow: 0 0 6px var(--green);
    box-shadow: 0 0 12px rgba(57,255,106,0.2), inset 0 0 12px rgba(57,255,106,0.05);
    transition: all 0.1s;
    position: relative;
    overflow: hidden;
  }
  .pixel-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green);
    opacity: 0;
    transition: opacity 0.1s;
  }
  .pixel-btn:active::before { opacity: 0.15; }
  .pixel-btn:active { transform: scale(0.96); }

  .pixel-btn.red {
    border-color: var(--red);
    color: var(--red);
    text-shadow: 0 0 6px var(--red);
    box-shadow: 0 0 12px rgba(255,57,57,0.2);
  }
  .pixel-btn.red::before { background: var(--red); }

  .game-over-stats {
    font-size: 8px;
    color: var(--white);
    line-height: 2.2;
    border: 2px solid var(--border);
    padding: 14px 20px;
    background: var(--panel);
    width: 100%;
  }
  .stat-row { display: flex; justify-content: space-between; gap: 16px; }
  .stat-val { color: var(--yellow); }

  /* ── COMBO FLASH ── */
  .combo-announce {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--purple);
    text-shadow: 0 0 12px var(--purple);
    pointer-events: none;
    z-index: 30;
    white-space: nowrap;
    animation: comboAnnounce 0.7s ease-out forwards;
  }
  @keyframes comboAnnounce {
    0%   { transform: translateX(-50%) scale(0.5); opacity: 1; }
    60%  { transform: translateX(-50%) scale(1.1); opacity: 1; }
    100% { transform: translateX(-50%) scale(1); opacity: 0; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">PIXEL SMASH</div>
    <div class="tagline">▶ TAP THE TARGET ◀</div>
  </header>

  <div class="score-bar">
    <div class="score-block">
      <div class="score-label">SCORE</div>
      <div class="score-val green" id="score">0</div>
    </div>
    <div class="score-block">
      <div class="score-label">BEST</div>
      <div class="score-val yellow" id="best">0</div>
    </div>
    <div class="score-block">
      <div class="score-label">LIVES</div>
      <div class="lives" id="lives">
        <span class="heart">♥</span>
        <span class="heart">♥</span>
        <span class="heart">♥</span>
      </div>
    </div>
  </div>

  <div class="combo-bar-wrap">
    <div class="combo-label">
      <span>COMBO</span>
      <span id="combo-count">x0</span>
    </div>
    <div class="combo-track">
      <div class="combo-fill" id="combo-fill"></div>
    </div>
  </div>

  <div id="arena">
    <!-- Start Screen -->
    <div class="screen" id="start-screen">
      <div class="screen-title">PIXEL<br>SMASH</div>
      <div class="screen-sub">
        TAP ✦ TARGETS TO SCORE<br>
        AVOID ✖ BAD TILES<br>
        ★ BONUS = EXTRA POINTS<br><br>
        SPEED INCREASES OVER TIME
      </div>
      <button class="pixel-btn" id="start-btn">▶ START</button>
    </div>

    <!-- Game Over Screen -->
    <div class="screen hidden" id="gameover-screen">
      <div class="screen-title" style="color:var(--red);text-shadow:0 0 10px var(--red)">GAME<br>OVER</div>
      <div class="game-over-stats">
        <div class="stat-row"><span>SCORE</span><span class="stat-val" id="go-score">0</span></div>
        <div class="stat-row"><span>BEST</span><span class="stat-val" id="go-best">0</span></div>
        <div class="stat-row"><span>MAX COMBO</span><span class="stat-val" id="go-combo">0</span></div>
        <div class="stat-row"><span>HITS</span><span class="stat-val" id="go-hits">0</span></div>
      </div>
      <button class="pixel-btn" id="retry-btn">↺ RETRY</button>
    </div>
  </div>

  <div class="timer-wrap">
    <div class="timer-track">
      <div class="timer-fill" id="timer-fill"></div>
    </div>
  </div>
</div>

<script>
  // ── STATE ──
  const MAX_LIVES = 3;
  const ROUND_DURATION = 30000; // 30 seconds per round
  const EMOJIS = {
    good:  ['⬡','◈','⬢','◉','◎','⊛'],
    bad:   ['✖','☠','⊘','⛒'],
    bonus: ['★','⍟','✦']
  };

  let state = {};
  let spawnTimer = null;
  let roundTimer = null;
  let timerInterval = null;
  let targets = [];
  let best = parseInt(localStorage.getItem('pixelsmash_best') || '0');

  // ── DOM ──
  const arena       = document.getElementById('arena');
  const scoreEl     = document.getElementById('score');
  const bestEl      = document.getElementById('best');
  const livesEl     = document.getElementById('lives');
  const comboFill   = document.getElementById('combo-fill');
  const comboCount  = document.getElementById('combo-count');
  const timerFill   = document.getElementById('timer-fill');
  const startScreen = document.getElementById('start-screen');
  const goScreen    = document.getElementById('gameover-screen');
  const startBtn    = document.getElementById('start-btn');
  const retryBtn    = document.getElementById('retry-btn');

  bestEl.textContent = best;

  // ── HELPERS ──
  function rand(a, b) { return Math.random() * (b - a) + a; }
  function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
  function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

  function getArenaRect() {
    return { w: arena.clientWidth, h: arena.clientHeight };
  }

  // ── INIT GAME ──
  function startGame() {
    state = {
      score: 0,
      lives: MAX_LIVES,
      combo: 0,
      maxCombo: 0,
      hits: 0,
      running: true,
      startTime: Date.now(),
      speed: 1,
    };
    targets = [];
    // clear existing targets
    arena.querySelectorAll('.target, .burst, .float-text, .miss-flash, .combo-announce')
         .forEach(el => el.remove());

    startScreen.classList.add('hidden');
    goScreen.classList.add('hidden');

    updateScore();
    updateLives();
    updateCombo();

    timerFill.style.width = '100%';
    timerFill.className = 'timer-fill';

    clearAllTimers();
    scheduleSpawn();
    startRoundTimer();
  }

  function endGame() {
    state.running = false;
    clearAllTimers();
    targets.forEach(t => t.el && t.el.remove());
    targets = [];

    if (state.score > best) {
      best = state.score;
      localStorage.setItem('pixelsmash_best', best);
    }
    bestEl.textContent = best;

    document.getElementById('go-score').textContent = state.score;
    document.getElementById('go-best').textContent = best;
    document.getElementById('go-combo').textContent = state.maxCombo;
    document.getElementById('go-hits').textContent = state.hits;

    goScreen.classList.remove('hidden');
  }

  function clearAllTimers() {
    clearTimeout(spawnTimer);
    clearInterval(timerInterval);
    clearTimeout(roundTimer);
  }

  // ── TIMER ──
  function startRoundTimer() {
    const start = Date.now();
    timerInterval = setInterval(() => {
      if (!state.running) return;
      const elapsed = Date.now() - start;
      const pct = Math.max(0, 1 - elapsed / ROUND_DURATION);
      timerFill.style.width = (pct * 100) + '%';
      if (pct < 0.25) timerFill.className = 'timer-fill danger';
      else if (pct < 0.5) timerFill.className = 'timer-fill warn';
      else timerFill.className = 'timer-fill';

      // Increase speed over time
      state.speed = 1 + (elapsed / ROUND_DURATION) * 1.8;
    }, 100);

    roundTimer = setTimeout(() => {
      if (state.running) endGame();
    }, ROUND_DURATION);
  }

  // ── SPAWN ──
  function getSpawnDelay() {
    const base = 1400;
    const min  = 450;
    return Math.max(min, base / state.speed);
  }

  function getTargetLifetime() {
    const base = 2000;
    const min  = 700;
    return Math.max(min, base / state.speed);
  }

  function scheduleSpawn() {
    if (!state.running) return;
    spawnTimer = setTimeout(() => {
      spawnTarget();
      scheduleSpawn();
    }, getSpawnDelay());
  }

  function spawnTarget() {
    if (!state.running) return;
    const { w, h } = getArenaRect();
    const size = 56;
    const margin = 12;

    // Decide type
    const roll = Math.random();
    let type;
    if (roll < 0.60) type = 'good';
    else if (roll < 0.82) type = 'bad';
    else type = 'bonus';

    const emoji = pick(EMOJIS[type]);
    const x = rand(margin, w - size - margin);
    const y = rand(margin, h - size - margin);

    const el = document.createElement('div');
    el.className = `target ${type}`;
    el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;`;
    el.innerHTML = `<div class="target-inner">${emoji}</div>`;

    arena.appendChild(el);

    const lifetime = getTargetLifetime();
    const info = { el, type, x, y, size, timeout: null };

    // auto-expire
    info.timeout = setTimeout(() => {
      removeTarget(info);
      if (type === 'good' && state.running) {
        // missed a good target
        loseLife(x + size / 2, y + size / 2);
        resetCombo();
      }
    }, lifetime);

    targets.push(info);

    el.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      handleTap(info, e);
    });
  }

  function removeTarget(info) {
    clearTimeout(info.timeout);
    if (info.el && info.el.parentNode) info.el.remove();
    targets = targets.filter(t => t !== info);
  }

  // ── TAP HANDLER ──
  function handleTap(info, e) {
    if (!state.running) return;
    const rect = arena.getBoundingClientRect();
    const tapX = (e.clientX || e.touches?.[0]?.clientX || info.x) - rect.left;
    const tapY = (e.clientY || e.touches?.[0]?.clientY || info.y) - rect.top;

    removeTarget(info);

    if (info.type === 'good') {
      state.combo++;
      state.hits++;
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      const pts = 10 * Math.max(1, state.combo);
      state.score += pts;
      spawnParticles(tapX, tapY, '✦', 'var(--green)', 6);
      showFloat(tapX, tapY, `+${pts}`, 'var(--green)');
      if (state.combo % 5 === 0) showComboAnnounce(`x${state.combo} COMBO!`);

    } else if (info.type === 'bad') {
      loseLife(tapX, tapY);
      resetCombo();

    } else if (info.type === 'bonus') {
      state.combo++;
      state.hits++;
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      const pts = 50 * Math.max(1, state.combo);
      state.score += pts;
      spawnParticles(tapX, tapY, '★', 'var(--yellow)', 8);
      showFloat(tapX, tapY, `+${pts} BONUS!`, 'var(--yellow)');
    }

    updateScore();
    updateCombo();
  }

  // ── MISS TAP (tapping arena background) ──
  arena.addEventListener('pointerdown', (e) => {
    if (!state.running) return;
    if (e.target !== arena && !e.target.classList.contains('screen')) return;
  });

  // ── LIFE LOSS ──
  function loseLife(x, y) {
    state.lives--;
    updateLives();
    spawnParticles(x, y, '✖', 'var(--red)', 5);
    const flash = document.createElement('div');
    flash.className = 'miss-flash';
    arena.appendChild(flash);
    setTimeout(() => flash.remove(), 300);
    if (state.lives <= 0) {
      setTimeout(() => { if (state.running) endGame(); }, 400);
    }
  }

  function resetCombo() {
    state.combo = 0;
    updateCombo();
  }

  // ── UI UPDATES ──
  function updateScore() {
    scoreEl.textContent = state.score;
    if (state.score > best) bestEl.textContent = state.score;
  }

  function updateLives() {
    const hearts = livesEl.querySelectorAll('.heart');
    hearts.forEach((h, i) => {
      h.classList.toggle('dead', i >= state.lives);
    });
  }

  function updateCombo() {
    const MAX = 10;
    const pct = Math.min(state.combo / MAX, 1) * 100;
    comboFill.style.width = pct + '%';
    comboCount.textContent = `x${state.combo}`;
    // color ramp
    if (state.combo >= MAX) {
      comboFill.style.background = 'var(--yellow)';
      comboFill.style.boxShadow = '0 0 10px var(--yellow)';
    } else if (state.combo >= 5) {
      comboFill.style.background = 'var(--cyan)';
      comboFill.style.boxShadow = '0 0 8px var(--cyan)';
    } else {
      comboFill.style.background = 'var(--purple)';
      comboFill.style.boxShadow = '0 0 8px var(--purple)';
    }
  }

  function spawnParticles(x, y, char, color, count) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'burst';
      p.textContent = char;
      p.style.left = x + 'px';
      p.style.top  = y + 'px';
      const angle = (i / count) * Math.PI * 2;
      const dist  = rand(28, 55);
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      p.style.color = color;
      arena.appendChild(p);
      setTimeout(() => p.remove(), 520);
    }
  }

  function showFloat(x, y, text, color) {
    const f = document.createElement('div');
    f.className = 'float-text';
    f.textContent = text;
    f.style.left = (x - 20) + 'px';
    f.style.top  = (y - 10) + 'px';
    f.style.color = color;
    f.style.textShadow = `0 0 6px ${color}`;
    arena.appendChild(f);
    setTimeout(() => f.remove(), 820);
  }

  function showComboAnnounce(text) {
    const a = document.createElement('div');
    a.className = 'combo-announce';
    a.textContent = text;
    arena.appendChild(a);
    setTimeout(() => a.remove(), 720);
  }

  // ── BUTTON HANDLERS ──
  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);

  // prevent scroll bounce on mobile
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
